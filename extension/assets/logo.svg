<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#0c0c0c"/>
  <!-- Lime accent glow -->
  <rect width="128" height="128" rx="28" fill="url(#glow)" opacity="0.4"/>
  <!-- "FT" text -->
  <text
    x="64"
    y="82"
    text-anchor="middle"
    font-family="'Space Grotesk', 'Arial', sans-serif"
    font-size="56"
    font-weight="700"
    fill="#ccff00"
    letter-spacing="-3"
  >FT</text>
  <!-- Bottom accent line -->
  <rect x="32" y="98" width="64" height="3" rx="1.5" fill="#ccff00" opacity="0.5"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccff00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ccff00" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
